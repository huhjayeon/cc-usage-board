<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Claude Usage Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<script src="data.js"></script>
<style>
  :root {
    --bg: #0d1117;
    --panel: #161b22;
    --panel-2: #1c2128;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #d97757;
    --accent-2: #f0a878;
    --good: #3fb950;
    --warn: #d29922;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Pretendard', sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 24px;
  }
  h1 { margin: 0 0 4px; font-size: 22px; font-weight: 600; }
  .sub { color: var(--muted); font-size: 13px; margin-bottom: 24px; }
  .sub button {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    margin-left: 8px;
  }
  .sub button:hover { border-color: var(--accent); }

  .grid-stats {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 12px;
    margin-bottom: 20px;
  }
  .stat.highlight { background: linear-gradient(135deg, #1c2128 0%, #2a1f1c 100%); border-color: #5c3a2e; }
  .stat .bar { height: 4px; background: var(--panel-2); border-radius: 2px; margin-top: 8px; overflow: hidden; }
  .stat .bar > div { height: 100%; background: var(--accent); transition: width 0.3s; }
  .stat {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
  }
  .stat .label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .stat .val { font-size: 22px; font-weight: 600; }
  .stat .sub-val { color: var(--muted); font-size: 12px; margin-top: 2px; }
  .stat .delta { font-size: 11px; margin-top: 4px; }
  .stat .delta.up { color: var(--good); }
  .stat .delta.down { color: var(--warn); }

  .grid-main {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
  }
  .panel h2 { margin: 0 0 12px; font-size: 14px; font-weight: 600; color: var(--text); }
  .panel .sub-h { color: var(--muted); font-size: 11px; font-weight: 400; }

  /* Heatmap */
  #heatmap { display: grid; grid-template-rows: repeat(7, 14px); grid-auto-flow: column; gap: 3px; }
  .cell { width: 14px; height: 14px; border-radius: 3px; background: var(--panel-2); cursor: pointer; }
  .cell.l1 { background: #033a16; }
  .cell.l2 { background: #196c2e; }
  .cell.l3 { background: #2ea043; }
  .cell.l4 { background: #56d364; }
  .cell:hover { outline: 1px solid var(--accent); }
  .heatmap-wrap { overflow-x: auto; }
  .heatmap-legend { display: flex; align-items: center; gap: 4px; color: var(--muted); font-size: 11px; margin-top: 8px; justify-content: flex-end; }
  .heatmap-legend .cell { width: 10px; height: 10px; }

  canvas { max-width: 100%; }

  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th, td { text-align: left; padding: 6px 8px; border-bottom: 1px solid var(--border); }
  th { color: var(--muted); font-weight: 500; font-size: 11px; text-transform: uppercase; }
  td.num { text-align: right; font-variant-numeric: tabular-nums; }
  tbody tr:hover { background: var(--panel-2); }

  .model-pill {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 10px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    margin-right: 3px;
    color: var(--muted);
  }
  .model-pill.opus { color: #f0a878; border-color: #5c3a2e; }
  .model-pill.sonnet { color: #79c0ff; border-color: #2c4a6e; }
  .model-pill.haiku { color: #56d364; border-color: #1f5028; }

  #tooltip {
    position: fixed;
    background: #000;
    border: 1px solid var(--border);
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 12px;
    pointer-events: none;
    display: none;
    z-index: 100;
  }
</style>
</head>
<body>
<h1>Claude 토큰 사용량 대시보드</h1>
<div class="sub">
  <span id="updated"></span>
  <button onclick="location.reload()">🔄 새로고침</button>
  <span style="margin-left: 12px; color: var(--muted); font-size: 11px;">데이터 갱신: 터미널에서 <code>~/claude-dashboard/update.sh</code></span>
</div>

<div class="grid-stats">
  <div class="stat"><div class="label">오늘</div><div class="val" id="s-today">-</div><div class="sub-val" id="s-today-cost"></div><div class="delta" id="s-today-delta"></div></div>
  <div class="stat"><div class="label">어제</div><div class="val" id="s-yesterday">-</div><div class="sub-val" id="s-yesterday-cost"></div></div>
  <div class="stat"><div class="label">최근 7일</div><div class="val" id="s-week">-</div><div class="sub-val" id="s-week-cost"></div><div class="delta" id="s-week-delta"></div></div>
  <div class="stat"><div class="label">이번 달</div><div class="val" id="s-month">-</div><div class="sub-val" id="s-month-cost"></div><div class="delta" id="s-month-delta"></div></div>
  <div class="stat"><div class="label">전체 누적</div><div class="val" id="s-total">-</div><div class="sub-val" id="s-total-cost"></div></div>
  <div class="stat highlight"><div class="label">플랜 대비 (이번 달) <span id="s-plan-name" style="color:var(--muted)"></span></div><div class="val" id="s-plan-ratio">-</div><div class="sub-val" id="s-plan-detail"></div><div class="bar"><div id="s-plan-bar" style="width:0%"></div></div></div>
</div>

<div class="grid-main" style="grid-template-columns: 1fr 1fr;">
  <div class="panel">
    <h2>월별 추이</h2>
    <canvas id="monthlyChart" height="160"></canvas>
  </div>
  <div class="panel">
    <h2>최근 60일 일별 토큰 <span class="sub-h" id="daily-meta"></span></h2>
    <canvas id="dailyChart" height="160"></canvas>
  </div>
</div>

<div class="grid-main" style="grid-template-columns: 7fr 3fr;">
  <div class="panel">
    <h2>활동 히트맵 <span class="sub-h">최근 90일 · GitHub 스타일</span></h2>
    <div class="heatmap-wrap">
      <div id="heatmap"></div>
    </div>
    <div class="heatmap-legend">
      <span>적음</span>
      <div class="cell"></div>
      <div class="cell l1"></div>
      <div class="cell l2"></div>
      <div class="cell l3"></div>
      <div class="cell l4"></div>
      <span>많음</span>
    </div>
  </div>
  <div class="panel">
    <h2>이번 달 모델별 비중</h2>
    <div style="height: 200px; display: flex; align-items: center; justify-content: center;">
      <canvas id="modelChart"></canvas>
    </div>
  </div>
</div>

<div class="panel" style="margin-top: 16px;">
  <h2>최근 30일 일별 상세</h2>
  <table>
    <thead>
      <tr>
        <th>날짜</th>
        <th>요일</th>
        <th>모델</th>
        <th class="num">총 토큰</th>
        <th class="num">Output</th>
        <th class="num">Cache Read</th>
        <th class="num">비용 환산</th>
      </tr>
    </thead>
    <tbody id="dailyTable"></tbody>
  </table>
</div>

<div id="tooltip"></div>

<script>
// 본인 플랜에 맞게 수정: Pro=20, Max 5x=100, Max 20x=200
const PLAN_PRICE_USD = 200;
const PLAN_NAME = 'Max 20x';

const fmt = n => {
  if (n == null || isNaN(n)) return '0';
  n = Math.round(n);
  if (n >= 1e8) {
    const eok = n / 1e8;
    return (eok >= 10 ? Math.round(eok).toLocaleString() : eok.toFixed(1)) + '억';
  }
  if (n >= 1e4) {
    return Math.round(n / 1e4).toLocaleString() + '만';
  }
  return n.toLocaleString();
};
const fmtUSD = n => '$' + (n < 10 ? n.toFixed(2) : Math.round(n).toLocaleString());
const dow = ['일','월','화','수','목','금','토'];

function modelShort(name) {
  if (name.includes('opus')) {
    const m = name.match(/opus-(\d+-\d+)/);
    return { label: 'Opus ' + (m ? m[1].replace('-','.') : ''), cls: 'opus' };
  }
  if (name.includes('sonnet')) {
    const m = name.match(/sonnet-(\d+-\d+)/);
    return { label: 'Sonnet ' + (m ? m[1].replace('-','.') : ''), cls: 'sonnet' };
  }
  if (name.includes('haiku')) {
    const m = name.match(/haiku-(\d+-\d+)/);
    return { label: 'Haiku ' + (m ? m[1].replace('-','.') : ''), cls: 'haiku' };
  }
  return { label: name, cls: '' };
}

async function load() {
  if (!window.CLAUDE_DATA) {
    throw new Error('data.js를 찾을 수 없어요. 먼저 ~/claude-dashboard/update.sh 를 실행하세요.');
  }
  return {
    daily: window.CLAUDE_DATA.daily.daily,
    monthly: window.CLAUDE_DATA.monthly.monthly,
  };
}

function findByDate(daily, dateStr) {
  return daily.find(d => d.date === dateStr);
}

function dateOffset(days) {
  const d = new Date();
  d.setDate(d.getDate() + days);
  return d.toISOString().slice(0, 10);
}

function render({ daily, monthly }) {
  const today = dateOffset(0);
  const yesterday = dateOffset(-1);
  const monthStart = today.slice(0, 7);

  document.getElementById('updated').textContent =
    `최종 업데이트: ${new Date().toLocaleString('ko-KR')} · 데이터 범위: ${daily[0]?.date} ~ ${daily.at(-1)?.date}`;

  // ---- Stats ----
  const todayD = findByDate(daily, today);
  const yestD = findByDate(daily, yesterday);
  const last7 = daily.filter(d => d.date > dateOffset(-7));
  const prev7 = daily.filter(d => d.date > dateOffset(-14) && d.date <= dateOffset(-7));
  const thisMonth = monthly.find(m => m.month === monthStart);
  const prevMonthStr = (() => {
    const d = new Date(monthStart + '-01');
    d.setMonth(d.getMonth() - 1);
    return d.toISOString().slice(0, 7);
  })();
  const prevMonth = monthly.find(m => m.month === prevMonthStr);
  const total = monthly.reduce((s, m) => ({ tok: s.tok + m.totalTokens, cost: s.cost + m.totalCost }), { tok: 0, cost: 0 });

  const sumTok = arr => arr.reduce((s, d) => s + d.totalTokens, 0);
  const sumCost = arr => arr.reduce((s, d) => s + d.totalCost, 0);

  const setStat = (id, tok, cost) => {
    document.getElementById('s-' + id).textContent = tok != null ? fmt(tok) : '0';
    document.getElementById('s-' + id + '-cost').textContent = cost != null ? fmtUSD(cost) : '$0';
  };
  setStat('today', todayD?.totalTokens || 0, todayD?.totalCost || 0);
  setStat('yesterday', yestD?.totalTokens || 0, yestD?.totalCost || 0);
  setStat('week', sumTok(last7), sumCost(last7));
  setStat('month', thisMonth?.totalTokens || 0, thisMonth?.totalCost || 0);
  setStat('total', total.tok, total.cost);

  // 플랜 대비
  const monthCost = thisMonth?.totalCost || 0;
  const ratio = (monthCost / PLAN_PRICE_USD) * 100;
  document.getElementById('s-plan-name').textContent = `· ${PLAN_NAME} $${PLAN_PRICE_USD}`;
  document.getElementById('s-plan-ratio').textContent = ratio >= 1000 ? Math.round(ratio) + '%' : ratio.toFixed(0) + '%';
  document.getElementById('s-plan-detail').textContent = `${(monthCost/PLAN_PRICE_USD).toFixed(1)}배 사용 · $${Math.round(monthCost)}`;
  const barWidth = Math.min(ratio, 100);
  const bar = document.getElementById('s-plan-bar');
  bar.style.width = barWidth + '%';
  bar.style.background = ratio < 50 ? '#8b949e' : ratio < 100 ? '#3fb950' : ratio < 300 ? '#56d364' : ratio < 500 ? '#f0a878' : '#d97757';

  // Deltas
  const delta = (cur, prev) => {
    if (!prev) return '';
    const pct = ((cur - prev) / prev) * 100;
    const sign = pct >= 0 ? '↑' : '↓';
    return `<span class="${pct >= 0 ? 'up' : 'down'}">${sign} ${Math.abs(pct).toFixed(0)}% vs 어제</span>`;
  };
  document.getElementById('s-today-delta').innerHTML =
    todayD && yestD ? delta(todayD.totalTokens, yestD.totalTokens) : '';
  const week7 = sumTok(last7), prevWeek7 = sumTok(prev7);
  document.getElementById('s-week-delta').innerHTML =
    prevWeek7 ? `<span class="${week7 >= prevWeek7 ? 'up' : 'down'}">${week7 >= prevWeek7 ? '↑' : '↓'} ${Math.abs(((week7-prevWeek7)/prevWeek7)*100).toFixed(0)}% vs 직전 7일</span>` : '';
  // MTD 비교: 같은 기간 (예: 5/1~5/11 vs 4/1~4/11)
  const todayDate = new Date(today);
  const todayDay = todayDate.getDate();
  const sumRange = (yyyymm, fromDay, toDay) => daily
    .filter(d => d.date.startsWith(yyyymm))
    .filter(d => {
      const day = parseInt(d.date.slice(8, 10));
      return day >= fromDay && day <= toDay;
    })
    .reduce((s, d) => s + d.totalTokens, 0);
  const mtdNow = sumRange(monthStart, 1, todayDay);
  const mtdPrev = sumRange(prevMonthStr, 1, todayDay);
  if (mtdPrev > 0) {
    const up = mtdNow >= mtdPrev;
    const pct = Math.abs(((mtdNow - mtdPrev) / mtdPrev) * 100).toFixed(0);
    document.getElementById('s-month-delta').innerHTML =
      `<span class="${up ? 'up' : 'down'}">${up ? '↑' : '↓'} ${pct}% vs 지난달 1~${todayDay}일</span>`;
  }

  // ---- Daily chart (last 60 days) ----
  const since60 = dateOffset(-60);
  const last60 = daily.filter(d => d.date >= since60);
  const last60Map = new Map(last60.map(d => [d.date, d]));
  // Fill gaps with 0
  const filled60 = [];
  for (let i = 60; i >= 0; i--) {
    const ds = dateOffset(-i);
    const d = last60Map.get(ds);
    filled60.push({ date: ds, tokens: d?.totalTokens || 0, cost: d?.totalCost || 0 });
  }
  const peak = Math.max(...filled60.map(d => d.tokens));
  const avg60 = filled60.reduce((s, d) => s + d.tokens, 0) / filled60.length;
  document.getElementById('daily-meta').textContent = `· 일평균 ${fmt(avg60)} · 피크 ${fmt(peak)}`;

  new Chart(document.getElementById('dailyChart'), {
    type: 'bar',
    data: {
      labels: filled60.map(d => d.date.slice(5)),
      datasets: [{
        label: '총 토큰',
        data: filled60.map(d => d.tokens),
        backgroundColor: filled60.map(d => d.tokens > avg60 * 1.5 ? '#f0a878' : '#d97757'),
        borderRadius: 2,
      }],
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => {
              const d = filled60[ctx.dataIndex];
              return [`${fmt(d.tokens)} 토큰`, `${fmtUSD(d.cost)} 환산`];
            }
          }
        }
      },
      scales: {
        y: {
          ticks: { color: '#8b949e', callback: v => fmt(v) },
          grid: { color: '#30363d' },
        },
        x: {
          ticks: { color: '#8b949e', maxRotation: 0, autoSkip: true, maxTicksLimit: 12 },
          grid: { display: false },
        },
      },
    },
  });

  // ---- Model donut (this month) ----
  if (thisMonth?.modelBreakdowns?.length) {
    const breakdowns = thisMonth.modelBreakdowns;
    new Chart(document.getElementById('modelChart'), {
      type: 'doughnut',
      data: {
        labels: breakdowns.map(b => modelShort(b.modelName).label),
        datasets: [{
          data: breakdowns.map(b => b.inputTokens + b.outputTokens + b.cacheCreationTokens + b.cacheReadTokens),
          backgroundColor: ['#d97757', '#79c0ff', '#56d364', '#f0a878', '#bc8cff'],
          borderColor: '#161b22',
          borderWidth: 2,
        }],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { position: 'bottom', labels: { color: '#e6edf3', font: { size: 10 }, boxWidth: 10, padding: 6 } },
          tooltip: {
            callbacks: {
              label: ctx => `${ctx.label}: ${fmt(ctx.raw)} (${(ctx.raw/breakdowns.reduce((s,b)=>s+b.inputTokens+b.outputTokens+b.cacheCreationTokens+b.cacheReadTokens,0)*100).toFixed(0)}%)`
            }
          }
        }
      }
    });
  }

  // ---- Heatmap (90 days) ----
  const heat = document.getElementById('heatmap');
  const tooltip = document.getElementById('tooltip');
  // Start from 90 days ago, but align to Sunday (column start)
  const start = new Date();
  start.setDate(start.getDate() - 90);
  // Roll back to Sunday
  start.setDate(start.getDate() - start.getDay());
  const dailyMap = new Map(daily.map(d => [d.date, d]));
  const max90 = Math.max(...daily.filter(d => d.date >= dateOffset(-90)).map(d => d.totalTokens), 1);
  const today_ = new Date();

  for (let i = 0; i < 14 * 7; i++) {
    const d = new Date(start);
    d.setDate(d.getDate() + i);
    if (d > today_) break;
    const ds = d.toISOString().slice(0, 10);
    const data = dailyMap.get(ds);
    const tok = data?.totalTokens || 0;
    let level = 0;
    if (tok > 0) {
      const r = tok / max90;
      level = r > 0.6 ? 4 : r > 0.3 ? 3 : r > 0.1 ? 2 : 1;
    }
    const cell = document.createElement('div');
    cell.className = 'cell' + (level ? ' l' + level : '');
    cell.dataset.tip = `${ds} (${dow[d.getDay()]}): ${fmt(tok)} 토큰 · ${fmtUSD(data?.totalCost || 0)}`;
    cell.addEventListener('mouseenter', e => {
      tooltip.textContent = e.target.dataset.tip;
      tooltip.style.display = 'block';
    });
    cell.addEventListener('mousemove', e => {
      tooltip.style.left = (e.clientX + 10) + 'px';
      tooltip.style.top = (e.clientY + 10) + 'px';
    });
    cell.addEventListener('mouseleave', () => tooltip.style.display = 'none');
    heat.appendChild(cell);
  }

  // ---- Monthly chart ----
  new Chart(document.getElementById('monthlyChart'), {
    type: 'bar',
    data: {
      labels: monthly.map(m => m.month),
      datasets: [
        {
          label: '총 토큰',
          data: monthly.map(m => m.totalTokens),
          backgroundColor: '#d97757',
          borderRadius: 4,
          yAxisID: 'y',
        },
        {
          label: '비용 환산 ($)',
          data: monthly.map(m => m.totalCost),
          type: 'line',
          borderColor: '#79c0ff',
          backgroundColor: '#79c0ff',
          tension: 0.3,
          yAxisID: 'y1',
        },
      ],
    },
    options: {
      responsive: true,
      plugins: {
        legend: { labels: { color: '#e6edf3', font: { size: 11 } } },
      },
      scales: {
        y: { ticks: { color: '#8b949e', callback: v => fmt(v) }, grid: { color: '#30363d' } },
        y1: { position: 'right', ticks: { color: '#8b949e', callback: v => '$' + v }, grid: { display: false } },
        x: { ticks: { color: '#8b949e' }, grid: { display: false } },
      },
    },
  });

  // ---- Daily table ----
  const tbody = document.getElementById('dailyTable');
  const recent30 = [...daily].slice(-30).reverse();
  for (const d of recent30) {
    const dt = new Date(d.date);
    const tr = document.createElement('tr');
    const models = (d.modelsUsed || []).map(m => {
      const s = modelShort(m);
      return `<span class="model-pill ${s.cls}">${s.label}</span>`;
    }).join('');
    tr.innerHTML = `
      <td>${d.date}</td>
      <td>${dow[dt.getDay()]}</td>
      <td>${models}</td>
      <td class="num">${fmt(d.totalTokens)}</td>
      <td class="num">${fmt(d.outputTokens)}</td>
      <td class="num">${fmt(d.cacheReadTokens)}</td>
      <td class="num">${fmtUSD(d.totalCost)}</td>
    `;
    tbody.appendChild(tr);
  }
}

load().then(render).catch(err => {
  document.body.innerHTML = `<h1 style="color:#f85149">데이터 로드 실패</h1><pre>${err.message}\n\n터미널에서 먼저 실행:\n~/claude-dashboard/update.sh</pre>`;
});
</script>
</body>
</html>
