<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title data-i18n="pageTitleDashboard">Claude Usage Dashboard</title>
<link rel="stylesheet" href="styles.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"
        integrity="sha384-9nhczxUqK87bcKHh20fSQcTGD4qq5GhayNYSYWqwBkINBhOfQLg/P5HG5lF1urn4"
        crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"
        integrity="sha384-cVMg8E3QFwTvGCDuK+ET4PD341jF3W8nO1auiXfuZNQkzbUUiBGLsIQUE+b1mxws"
        crossorigin="anonymous"></script>
<script src="i18n.js"></script>
<script src="shared.js"></script>
<script src="data.js"></script>
<style>
  body { padding: 24px; }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 4px;
  }
  h1 { margin: 0 0 4px; font-size: 22px; font-weight: 600; }
  .sub { color: var(--muted); font-size: 13px; margin-bottom: 24px; }
  .sub button {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    margin-left: 8px;
  }
  .sub button:hover { border-color: var(--accent); }

  .lang-toggle {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.5px;
    flex-shrink: 0;
  }
  .lang-toggle:hover { border-color: var(--accent); color: var(--accent); }

  .nav { display: flex; gap: 4px; margin-bottom: 16px; }
  .nav a {
    color: var(--muted);
    text-decoration: none;
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 13px;
    border: 1px solid transparent;
  }
  .nav a.active { background: var(--panel); border-color: var(--border); color: var(--text); }
  .nav a:hover:not(.active) { background: var(--panel-2); color: var(--text); }

  .grid-stats {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 12px;
    margin-bottom: 20px;
  }
  .stat.highlight { background: linear-gradient(135deg, #1c2128 0%, #2a1f1c 100%); border-color: #5c3a2e; }
  .stat .bar { height: 4px; background: var(--panel-2); border-radius: 2px; margin-top: 8px; overflow: hidden; }
  .stat .bar > div { height: 100%; background: var(--accent); transition: width 0.3s; }
  .stat {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
  }
  .stat .label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .stat .val { font-size: 22px; font-weight: 600; }
  .stat .sub-val { color: var(--muted); font-size: 12px; margin-top: 2px; }
  .stat .delta { font-size: 11px; margin-top: 4px; }
  .stat .delta.up { color: var(--good); }
  .stat .delta.down { color: var(--warn); }

  .grid-main {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
  }
  .panel h2 { margin: 0 0 12px; font-size: 14px; font-weight: 600; color: var(--text); }
  .panel .sub-h { color: var(--muted); font-size: 11px; font-weight: 400; }

  /* Heatmap */
  #heatmap { display: grid; grid-template-rows: repeat(7, 14px); grid-auto-flow: column; gap: 3px; }
  .cell { width: 14px; height: 14px; border-radius: 3px; background: var(--panel-2); cursor: pointer; }
  .cell.l1 { background: #033a16; }
  .cell.l2 { background: #196c2e; }
  .cell.l3 { background: #2ea043; }
  .cell.l4 { background: #56d364; }
  .cell:hover { outline: 1px solid var(--accent); }
  .heatmap-wrap { overflow-x: auto; }
  .heatmap-legend { display: flex; align-items: center; gap: 4px; color: var(--muted); font-size: 11px; margin-top: 8px; justify-content: flex-end; }
  .heatmap-legend .cell { width: 10px; height: 10px; }

  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th, td { text-align: left; padding: 6px 8px; border-bottom: 1px solid var(--border); }
  th { color: var(--muted); font-weight: 500; font-size: 11px; text-transform: uppercase; }
  td.num { text-align: right; font-variant-numeric: tabular-nums; }
  tbody tr:hover { background: var(--panel-2); }

  .model-pill {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 10px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    margin-right: 3px;
    color: var(--muted);
  }

  #tooltip {
    position: fixed;
    background: #000;
    border: 1px solid var(--border);
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 12px;
    pointer-events: none;
    display: none;
    z-index: 100;
  }
</style>
</head>
<body>
<div class="header">
  <h1 data-i18n="pageHeaderDashboard">Claude Token Usage Dashboard</h1>
  <button class="lang-toggle" id="lang-toggle" onclick="CLAUDE_I18N.toggle()"></button>
</div>
<div class="nav">
  <a href="dashboard.html" class="active" data-i18n="navDashboard">Dashboard</a>
  <a href="overview.html" data-i18n="navOverview">All Time</a>
</div>
<div class="sub">
  <span id="updated"></span>
  <button id="refresh-btn" onclick="location.reload()" data-i18n="refresh"></button>
  <span style="margin-left: 12px; color: var(--muted); font-size: 11px;">
    <span data-i18n="updateHelpPrefix"></span>
    <code>./update.sh</code> <span data-i18n="updateHelpMac"></span>
    <span data-i18n="updateHelpOr"></span>
    <code>node update.mjs</code> <span data-i18n="updateHelpWin"></span>
  </span>
</div>

<div class="grid-stats">
  <div class="stat"><div class="label" data-i18n="statToday"></div><div class="val" id="s-today">-</div><div class="sub-val" id="s-today-cost"></div><div class="delta" id="s-today-delta"></div></div>
  <div class="stat"><div class="label" data-i18n="statYesterday"></div><div class="val" id="s-yesterday">-</div><div class="sub-val" id="s-yesterday-cost"></div></div>
  <div class="stat"><div class="label" data-i18n="statWeek"></div><div class="val" id="s-week">-</div><div class="sub-val" id="s-week-cost"></div><div class="delta" id="s-week-delta"></div></div>
  <div class="stat"><div class="label" data-i18n="statMonth"></div><div class="val" id="s-month">-</div><div class="sub-val" id="s-month-cost"></div><div class="delta" id="s-month-delta"></div></div>
  <div class="stat"><div class="label" data-i18n="statTotal"></div><div class="val" id="s-total">-</div><div class="sub-val" id="s-total-cost"></div></div>
  <div class="stat highlight"><div class="label"><span data-i18n="statPlan"></span> <span id="s-plan-name" style="color:var(--muted)"></span></div><div class="val" id="s-plan-ratio">-</div><div class="sub-val" id="s-plan-detail"></div><div class="bar"><div id="s-plan-bar" style="width:0%"></div></div></div>
</div>

<div class="grid-main" style="grid-template-columns: 1fr 1fr;">
  <div class="panel">
    <h2 data-i18n="panelMonthlyTrend"></h2>
    <canvas id="monthlyChart" height="160"></canvas>
  </div>
  <div class="panel">
    <h2><span data-i18n="panelDaily60"></span> <span class="sub-h" id="daily-meta"></span></h2>
    <canvas id="dailyChart" height="160"></canvas>
  </div>
</div>

<div class="grid-main" style="grid-template-columns: 7fr 3fr;">
  <div class="panel">
    <h2><span data-i18n="panelHeatmap"></span> <span class="sub-h" data-i18n="panelHeatmapSub"></span></h2>
    <div class="heatmap-wrap">
      <div id="heatmap"></div>
    </div>
    <div class="heatmap-legend">
      <span data-i18n="heatmapLess"></span>
      <div class="cell"></div>
      <div class="cell l1"></div>
      <div class="cell l2"></div>
      <div class="cell l3"></div>
      <div class="cell l4"></div>
      <span data-i18n="heatmapMore"></span>
    </div>
  </div>
  <div class="panel">
    <h2 data-i18n="panelModelBreakdownThisMonth"></h2>
    <div class="canvas-center" style="height: 200px;">
      <canvas id="modelChart"></canvas>
    </div>
  </div>
</div>

<div class="panel" style="margin-top: 16px;">
  <h2 data-i18n="panelRecent30"></h2>
  <table>
    <thead>
      <tr>
        <th data-i18n="colDate"></th>
        <th data-i18n="colDay"></th>
        <th data-i18n="colModel"></th>
        <th class="num" data-i18n="colTotalTokens"></th>
        <th class="num" data-i18n="colOutput"></th>
        <th class="num" data-i18n="colCacheRead"></th>
        <th class="num" data-i18n="colCost"></th>
      </tr>
    </thead>
    <tbody id="dailyTable"></tbody>
  </table>
</div>

<div id="tooltip"></div>

<script>
// Adjust to your plan: Pro=20, Max 5x=100, Max 20x=200
const PLAN_PRICE_USD = 200;
const PLAN_NAME = 'Max 20x';

const I18N = window.CLAUDE_I18N;
I18N.applyDOM();
document.getElementById('lang-toggle').textContent = I18N.t('switchToLabel');
document.getElementById('lang-toggle').title = I18N.t('switchToTitle');

const fmt = n => I18N.fmt(n);
const fmtUSD = n => I18N.fmtUSD(n);
const dow = I18N.dow();
// modelShort() is provided by shared.js

function load() {
  if (!window.CLAUDE_DATA) {
    throw new Error(I18N.t('errDataMissing'));
  }
  return {
    daily: window.CLAUDE_DATA.daily.daily,
    monthly: window.CLAUDE_DATA.monthly.monthly,
  };
}

function findByDate(daily, dateStr) {
  return daily.find(d => d.date === dateStr);
}

function dateOffset(days) {
  const d = new Date();
  d.setDate(d.getDate() + days);
  return d.toISOString().slice(0, 10);
}

function render({ daily, monthly }) {
  const today = dateOffset(0);
  const yesterday = dateOffset(-1);
  const monthStart = today.slice(0, 7);

  document.getElementById('updated').textContent =
    `${I18N.t('lastUpdated')}: ${new Date().toLocaleString(I18N.locale())} · ${I18N.t('dataRange')}: ${daily[0]?.date} ~ ${daily.at(-1)?.date}`;

  // ---- Stats ----
  const todayD = findByDate(daily, today);
  const yestD = findByDate(daily, yesterday);
  const last7 = daily.filter(d => d.date > dateOffset(-7));
  const prev7 = daily.filter(d => d.date > dateOffset(-14) && d.date <= dateOffset(-7));
  const thisMonth = monthly.find(m => m.month === monthStart);
  const prevMonthStr = (() => {
    const d = new Date(monthStart + '-01');
    d.setMonth(d.getMonth() - 1);
    return d.toISOString().slice(0, 7);
  })();
  const total = monthly.reduce((s, m) => ({ tok: s.tok + m.totalTokens, cost: s.cost + m.totalCost }), { tok: 0, cost: 0 });

  const sumTok = arr => arr.reduce((s, d) => s + d.totalTokens, 0);
  const sumCost = arr => arr.reduce((s, d) => s + d.totalCost, 0);

  const setStat = (id, tok, cost) => {
    document.getElementById('s-' + id).textContent = tok != null ? fmt(tok) : '0';
    document.getElementById('s-' + id + '-cost').textContent = cost != null ? fmtUSD(cost) : '$0';
  };
  setStat('today', todayD?.totalTokens || 0, todayD?.totalCost || 0);
  setStat('yesterday', yestD?.totalTokens || 0, yestD?.totalCost || 0);
  setStat('week', sumTok(last7), sumCost(last7));
  setStat('month', thisMonth?.totalTokens || 0, thisMonth?.totalCost || 0);
  setStat('total', total.tok, total.cost);

  // Plan ratio
  const monthCost = thisMonth?.totalCost || 0;
  const ratio = (monthCost / PLAN_PRICE_USD) * 100;
  document.getElementById('s-plan-name').textContent = `· ${PLAN_NAME} $${PLAN_PRICE_USD}`;
  document.getElementById('s-plan-ratio').textContent = Math.round(ratio) + '%';
  document.getElementById('s-plan-detail').textContent = `${(monthCost/PLAN_PRICE_USD).toFixed(1)}x · $${Math.round(monthCost)}`;
  const barWidth = Math.min(ratio, 100);
  const bar = document.getElementById('s-plan-bar');
  bar.style.width = barWidth + '%';
  bar.style.background = ratio < 50 ? '#8b949e' : ratio < 100 ? '#3fb950' : ratio < 300 ? '#56d364' : ratio < 500 ? '#f0a878' : '#d97757';

  // Deltas
  const deltaSpan = (cur, prev, labelText) => {
    if (!prev) return null;
    const pct = ((cur - prev) / prev) * 100;
    const up = pct >= 0;
    return el('span', { class: up ? 'up' : 'down' },
      (up ? '↑' : '↓') + ' ' + Math.abs(pct).toFixed(0) + '% ' + labelText);
  };
  const setDelta = (id, span) => {
    const target = document.getElementById(id);
    target.replaceChildren();
    if (span) target.appendChild(span);
  };
  setDelta('s-today-delta',
    todayD && yestD ? deltaSpan(todayD.totalTokens, yestD.totalTokens, I18N.t('deltaVsYesterday')) : null);
  const week7 = sumTok(last7), prevWeek7 = sumTok(prev7);
  setDelta('s-week-delta', deltaSpan(week7, prevWeek7, I18N.t('deltaVsPrev7')));
  // MTD comparison: same range (e.g. 5/1~5/11 vs 4/1~4/11)
  const todayDate = new Date(today);
  const todayDay = todayDate.getDate();
  const sumRange = (yyyymm, fromDay, toDay) => daily
    .filter(d => d.date.startsWith(yyyymm))
    .filter(d => {
      const day = parseInt(d.date.slice(8, 10));
      return day >= fromDay && day <= toDay;
    })
    .reduce((s, d) => s + d.totalTokens, 0);
  const mtdNow = sumRange(monthStart, 1, todayDay);
  const mtdPrev = sumRange(prevMonthStr, 1, todayDay);
  setDelta('s-month-delta', deltaSpan(mtdNow, mtdPrev, I18N.t('deltaVsLastMonth', todayDay)));

  // ---- Daily chart (last 60 days) ----
  const since60 = dateOffset(-60);
  const last60 = daily.filter(d => d.date >= since60);
  const last60Map = new Map(last60.map(d => [d.date, d]));
  const filled60 = [];
  for (let i = 60; i >= 0; i--) {
    const ds = dateOffset(-i);
    const d = last60Map.get(ds);
    filled60.push({ date: ds, tokens: d?.totalTokens || 0, cost: d?.totalCost || 0 });
  }
  const peak = Math.max(...filled60.map(d => d.tokens));
  const avg60 = filled60.reduce((s, d) => s + d.tokens, 0) / filled60.length;
  document.getElementById('daily-meta').textContent = I18N.t('meta_dailyStats', fmt(avg60), fmt(peak));

  new Chart(document.getElementById('dailyChart'), {
    type: 'bar',
    data: {
      labels: filled60.map(d => d.date.slice(5)),
      datasets: [{
        label: I18N.t('dsTotalTokens'),
        data: filled60.map(d => d.tokens),
        backgroundColor: filled60.map(d => d.tokens > avg60 * 1.5 ? '#f0a878' : '#d97757'),
        borderRadius: 2,
      }],
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => {
              const d = filled60[ctx.dataIndex];
              return [I18N.t('tooltip_tokens', fmt(d.tokens)), I18N.t('tooltip_cost', fmtUSD(d.cost))];
            }
          }
        }
      },
      scales: {
        y: {
          ticks: { color: CHART_THEME.tick, callback: v => fmt(v) },
          grid: { color: CHART_THEME.grid },
        },
        x: {
          ticks: { color: CHART_THEME.tick, maxRotation: 0, autoSkip: true, maxTicksLimit: 12 },
          grid: { display: false },
        },
      },
    },
  });

  // ---- Model donut (this month) ----
  if (thisMonth?.modelBreakdowns?.length) {
    const breakdowns = thisMonth.modelBreakdowns;
    const totalModelTokens = breakdowns.reduce((s, b) => s + modelTokens(b), 0);
    new Chart(document.getElementById('modelChart'), {
      type: 'doughnut',
      data: {
        labels: breakdowns.map(b => modelShort(b.modelName).label),
        datasets: [{
          data: breakdowns.map(modelTokens),
          backgroundColor: CHART_COLORS.slice(0, 5),
          borderColor: CHART_THEME.panelBg,
          borderWidth: 2,
        }],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { position: 'bottom', labels: { color: CHART_THEME.legend, font: { size: 10 }, boxWidth: 10, padding: 6 } },
          tooltip: {
            callbacks: {
              label: ctx => `${ctx.label}: ${fmt(ctx.raw)} (${(ctx.raw / totalModelTokens * 100).toFixed(0)}%)`
            }
          }
        }
      }
    });
  }

  // ---- Heatmap (90 days) ----
  const heat = document.getElementById('heatmap');
  const tooltip = document.getElementById('tooltip');
  const start = new Date();
  start.setDate(start.getDate() - 90);
  start.setDate(start.getDate() - start.getDay());
  const dailyMap = new Map(daily.map(d => [d.date, d]));
  const max90 = Math.max(...daily.filter(d => d.date >= dateOffset(-90)).map(d => d.totalTokens), 1);
  const today_ = new Date();

  for (let i = 0; i < 14 * 7; i++) {
    const d = new Date(start);
    d.setDate(d.getDate() + i);
    if (d > today_) break;
    const ds = d.toISOString().slice(0, 10);
    const data = dailyMap.get(ds);
    const tok = data?.totalTokens || 0;
    let level = 0;
    if (tok > 0) {
      const r = tok / max90;
      level = r > 0.6 ? 4 : r > 0.3 ? 3 : r > 0.1 ? 2 : 1;
    }
    const cell = document.createElement('div');
    cell.className = 'cell' + (level ? ' l' + level : '');
    cell.dataset.tip = `${ds} (${dow[d.getDay()]}): ${I18N.t('tooltip_tokens', fmt(tok))} · ${fmtUSD(data?.totalCost || 0)}`;
    cell.addEventListener('mouseenter', e => {
      tooltip.textContent = e.target.dataset.tip;
      tooltip.style.display = 'block';
    });
    cell.addEventListener('mousemove', e => {
      tooltip.style.left = (e.clientX + 10) + 'px';
      tooltip.style.top = (e.clientY + 10) + 'px';
    });
    cell.addEventListener('mouseleave', () => tooltip.style.display = 'none');
    heat.appendChild(cell);
  }

  // ---- Monthly chart ----
  new Chart(document.getElementById('monthlyChart'), {
    type: 'bar',
    data: {
      labels: monthly.map(m => m.month),
      datasets: [
        {
          label: I18N.t('dsTotalTokens'),
          data: monthly.map(m => m.totalTokens),
          backgroundColor: '#d97757',
          borderRadius: 4,
          yAxisID: 'y',
        },
        {
          label: I18N.t('dsCost'),
          data: monthly.map(m => m.totalCost),
          type: 'line',
          borderColor: '#79c0ff',
          backgroundColor: '#79c0ff',
          tension: 0.3,
          yAxisID: 'y1',
        },
      ],
    },
    options: {
      responsive: true,
      plugins: {
        legend: { labels: { color: CHART_THEME.legend, font: { size: 11 } } },
      },
      scales: {
        y: { ticks: { color: CHART_THEME.tick, callback: v => fmt(v) }, grid: { color: CHART_THEME.grid } },
        y1: { position: 'right', ticks: { color: CHART_THEME.tick, callback: v => '$' + v }, grid: { display: false } },
        x: { ticks: { color: CHART_THEME.tick }, grid: { display: false } },
      },
    },
  });

  // ---- Daily table ----
  const tbody = document.getElementById('dailyTable');
  const recent30 = [...daily].slice(-30).reverse();
  for (const d of recent30) {
    const dt = new Date(d.date);
    const tr = el('tr', null,
      el('td', null, d.date),
      el('td', null, dow[dt.getDay()]),
      el('td', null, buildModelPills(d.modelsUsed)),
      el('td', { class: 'num' }, fmt(d.totalTokens)),
      el('td', { class: 'num' }, fmt(d.outputTokens)),
      el('td', { class: 'num' }, fmt(d.cacheReadTokens)),
      el('td', { class: 'num' }, fmtUSD(d.totalCost)),
    );
    tbody.appendChild(tr);
  }
}

function renderError(title, message) {
  document.body.replaceChildren();
  const h1 = document.createElement('h1');
  h1.style.color = '#f85149';
  h1.textContent = title;
  const pre = document.createElement('pre');
  pre.textContent = message + '\n\n' + I18N.t('errRunFirst') + '\n  macOS/Linux:  ./update.sh\n  Windows:      node update.mjs';
  document.body.append(h1, pre);
}

try {
  render(load());
} catch (err) {
  renderError(I18N.t('errLoadFailed'), err.message);
}
</script>
</body>
</html>
