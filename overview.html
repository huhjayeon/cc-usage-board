<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title data-i18n="pageTitleOverview">Claude Usage · All Time</title>
<link rel="stylesheet" href="styles.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"
        integrity="sha384-9nhczxUqK87bcKHh20fSQcTGD4qq5GhayNYSYWqwBkINBhOfQLg/P5HG5lF1urn4"
        crossorigin="anonymous"></script>
<script src="i18n.js"></script>
<script src="shared.js"></script>
<script src="data.js"></script>
<style>
  body { padding: 14px 18px; }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 2px;
  }
  h1 { margin: 0; font-size: 18px; font-weight: 600; }

  .lang-toggle {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    flex-shrink: 0;
  }
  .lang-toggle:hover { border-color: var(--accent); color: var(--accent); }

  .nav { display: flex; gap: 4px; margin: 6px 0 10px; }
  .nav a {
    color: var(--muted);
    text-decoration: none;
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 12px;
    border: 1px solid transparent;
  }
  .nav a.active { background: var(--panel); border-color: var(--border); color: var(--text); }
  .nav a:hover:not(.active) { background: var(--panel-2); color: var(--text); }

  .sub { color: var(--muted); font-size: 11px; margin-bottom: 10px; }

  .grid-stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 10px;
  }
  .stat {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
  }
  .stat.highlight { background: linear-gradient(135deg, #1c2128 0%, #2a1f1c 100%); border-color: #5c3a2e; }
  .stat .label { color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px; }
  .stat .val { font-size: 17px; font-weight: 600; line-height: 1.2; }
  .stat .sub-val { color: var(--muted); font-size: 11px; margin-top: 1px; }
  .stat .month-tag { color: var(--accent-2); font-size: 13px; font-weight: 500; }

  .grid-pair {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 10px;
  }
  .grid-triple {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-bottom: 10px;
  }
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
  }
  .panel h2 { margin: 0 0 6px; font-size: 12px; font-weight: 600; color: var(--text); }
  .panel .sub-h { color: var(--muted); font-size: 10px; font-weight: 400; }

  /* 도넛 패널은 그리드 행 높이를 따라 채워야 빈 공간이 안 생김 */
  .donut-panel { display: flex; flex-direction: column; }
  .donut-wrap {
    flex: 1;
    min-height: 150px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .table-wrap { max-height: 220px; overflow-y: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 11px; }
  th, td { text-align: left; padding: 4px 6px; border-bottom: 1px solid var(--border); }
  th { color: var(--muted); font-weight: 500; font-size: 10px; text-transform: uppercase; position: sticky; top: 0; background: var(--panel); }
  td.num { text-align: right; font-variant-numeric: tabular-nums; }
  tbody tr:hover { background: var(--panel-2); }
  tbody tr.current-month { background: rgba(217, 119, 87, 0.06); }
  .in-progress-tag { color: var(--accent); font-size: 9px; }

  .model-pill {
    display: inline-block;
    padding: 1px 5px;
    border-radius: 4px;
    font-size: 9px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    margin-right: 2px;
    color: var(--muted);
  }

  .delta-up { color: var(--good); font-size: 10px; }
  .delta-down { color: var(--warn); font-size: 10px; }

  @media (max-width: 1100px) {
    .grid-triple { grid-template-columns: 1fr 1fr; }
  }
  @media (max-width: 720px) {
    .grid-pair, .grid-triple, .grid-stats { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>
<div class="header">
  <h1 data-i18n="pageHeaderOverview">Claude Token Usage — All Time</h1>
  <button class="lang-toggle" id="lang-toggle" onclick="CLAUDE_I18N.toggle()"></button>
</div>
<div class="nav">
  <a href="dashboard.html" data-i18n="navDashboard">Dashboard</a>
  <a href="overview.html" class="active" data-i18n="navOverview">All Time</a>
</div>

<div class="sub" id="period-meta"></div>

<div class="grid-stats">
  <div class="stat">
    <div class="label" data-i18n="statTotalCumulative"></div>
    <div class="val" id="s-total-tok">-</div>
    <div class="sub-val" id="s-total-cost"></div>
  </div>
  <div class="stat highlight">
    <div class="label" data-i18n="statMonthlyAvg"></div>
    <div class="val" id="s-avg-tok">-</div>
    <div class="sub-val" id="s-avg-cost"></div>
  </div>
  <div class="stat">
    <div class="label" data-i18n="statPeakMonth"></div>
    <div class="val month-tag" id="s-peak-month">-</div>
    <div class="sub-val" id="s-peak-detail"></div>
  </div>
  <div class="stat">
    <div class="label" data-i18n="statLowMonth"></div>
    <div class="val month-tag" id="s-low-month">-</div>
    <div class="sub-val" id="s-low-detail"></div>
  </div>
</div>

<div class="grid-pair">
  <div class="panel">
    <h2><span data-i18n="panelMonthlyTrend"></span> <span class="sub-h" id="trend-meta"></span></h2>
    <canvas id="monthlyChart" height="120"></canvas>
  </div>
  <div class="panel">
    <h2><span data-i18n="panelCumulative"></span> <span class="sub-h" data-i18n="panelCumulativeSub"></span></h2>
    <canvas id="cumulativeChart" height="120"></canvas>
  </div>
</div>

<div class="grid-triple">
  <div class="panel donut-panel">
    <h2 data-i18n="panelAllModelBreakdown"></h2>
    <div class="donut-wrap">
      <canvas id="modelChart"></canvas>
    </div>
  </div>
  <div class="panel">
    <h2><span data-i18n="panelByWeekday"></span> <span class="sub-h" data-i18n="panelByWeekdaySub"></span></h2>
    <canvas id="weekdayChart" height="150"></canvas>
  </div>
  <div class="panel">
    <h2><span data-i18n="panelModelByMonth"></span> <span class="sub-h" data-i18n="panelModelByMonthSub"></span></h2>
    <canvas id="modelStackChart" height="150"></canvas>
  </div>
</div>

<div class="panel">
  <h2 data-i18n="panelMonthlyDetail"></h2>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th data-i18n="colMonth"></th>
          <th class="num" data-i18n="colTotalTokens"></th>
          <th class="num" data-i18n="statMCost"></th>
          <th class="num" data-i18n="colActiveDays"></th>
          <th class="num" data-i18n="colDailyAvg"></th>
          <th class="num" data-i18n="colVsLastMonth"></th>
          <th data-i18n="colModel"></th>
        </tr>
      </thead>
      <tbody id="monthlyTable"></tbody>
    </table>
  </div>
</div>

<script>
const I18N = window.CLAUDE_I18N;
I18N.applyDOM();
document.getElementById('lang-toggle').textContent = I18N.t('switchToLabel');
document.getElementById('lang-toggle').title = I18N.t('switchToTitle');

const fmt = n => I18N.fmt(n);
const fmtUSD = n => I18N.fmtUSD(n);
// modelShort() and CHART_COLORS are provided by shared.js

function renderError(title, message) {
  document.body.replaceChildren();
  const h1 = document.createElement('h1');
  h1.style.color = '#f85149';
  h1.textContent = title;
  const pre = document.createElement('pre');
  pre.textContent = message + '\n\n' + I18N.t('errRunFirst') + '\n  macOS/Linux:  ./update.sh\n  Windows:      node update.mjs';
  document.body.append(h1, pre);
}

if (!window.CLAUDE_DATA) {
  renderError(I18N.t('errLoadFailed'), I18N.t('errDataMissing'));
} else if (
  !window.CLAUDE_DATA.monthly?.monthly?.length ||
  !window.CLAUDE_DATA.daily?.daily?.length
) {
  renderError(I18N.t('errLoadFailed'), I18N.t('errEmptyData'));
} else {
  const monthly = [...window.CLAUDE_DATA.monthly.monthly].sort((a, b) => a.month.localeCompare(b.month));
  const daily = window.CLAUDE_DATA.daily.daily;
  const todayMonth = new Date().toISOString().slice(0, 7);

  // Pre-group daily entries by month so the monthly table can look up O(1)
  // instead of running daily.filter(...) once per row.
  const dailyByMonth = new Map();
  for (const d of daily) {
    const m = d.date.slice(0, 7);
    const bucket = dailyByMonth.get(m);
    if (bucket) bucket.push(d);
    else dailyByMonth.set(m, [d]);
  }

  // ---- Aggregate ----
  const totalTok = monthly.reduce((s, m) => s + m.totalTokens, 0);
  const totalCost = monthly.reduce((s, m) => s + m.totalCost, 0);
  const n = monthly.length;
  const avgTok = n > 0 ? totalTok / n : 0;
  const avgCost = n > 0 ? totalCost / n : 0;

  // Most/least expensive month — current month is in progress so it's excluded
  // from comparison. peak requires >=1 completed month, low requires >=2 (so it
  // can be distinct from peak).
  const completed = monthly.filter(m => m.month !== todayMonth);
  const sortedByCost = [...completed].sort((a, b) => b.totalCost - a.totalCost);
  const peak = completed.length >= 1 ? sortedByCost[0] : null;
  const low = completed.length >= 2 ? sortedByCost[sortedByCost.length - 1] : null;

  document.getElementById('period-meta').textContent =
    I18N.t('meta_overviewRange', monthly[0].month, monthly[n - 1].month, n) +
    (completed.length < n ? I18N.t('currentMonthInProgress') : '');

  document.getElementById('s-total-tok').textContent = fmt(totalTok);
  document.getElementById('s-total-cost').textContent = fmtUSD(totalCost);
  document.getElementById('s-avg-tok').textContent = fmt(avgTok);
  document.getElementById('s-avg-cost').textContent = `${fmtUSD(avgCost)}${I18N.t('avgCostSuffix')}`;
  const renderMonthStat = (idPrefix, m) => {
    if (m) {
      document.getElementById(idPrefix + '-month').textContent = m.month;
      document.getElementById(idPrefix + '-detail').textContent = `${fmt(m.totalTokens)} · ${fmtUSD(m.totalCost)}`;
    } else {
      document.getElementById(idPrefix + '-month').textContent = '—';
      document.getElementById(idPrefix + '-detail').textContent = I18N.t('insufficientData');
    }
  };
  renderMonthStat('s-peak', peak);
  renderMonthStat('s-low', low);

  // ---- Monthly trend chart ----
  document.getElementById('trend-meta').textContent = I18N.t('trendLegendNote');

  const dsTokens = I18N.t('dsTotalTokens');
  const dsCost = I18N.t('dsCost');
  const dsAvg = I18N.t('dsMonthlyAvgTokens');

  new Chart(document.getElementById('monthlyChart'), {
    type: 'bar',
    data: {
      labels: monthly.map(m => m.month),
      datasets: [
        {
          label: dsTokens,
          data: monthly.map(m => m.totalTokens),
          backgroundColor: monthly.map(m => m.month === todayMonth ? '#f0a878' : '#d97757'),
          borderRadius: 4,
          yAxisID: 'y',
          order: 2,
        },
        {
          label: dsCost,
          data: monthly.map(m => m.totalCost),
          type: 'line',
          borderColor: '#79c0ff',
          backgroundColor: '#79c0ff',
          tension: 0.3,
          yAxisID: 'y1',
          order: 1,
        },
        {
          label: dsAvg,
          data: monthly.map(() => avgTok),
          type: 'line',
          borderColor: 'rgba(139, 148, 158, 0.6)',
          borderDash: [4, 4],
          pointRadius: 0,
          fill: false,
          yAxisID: 'y',
          order: 0,
        },
      ],
    },
    options: {
      responsive: true,
      plugins: {
        legend: { labels: { color: CHART_THEME.legend, font: { size: 11 } } },
        tooltip: {
          callbacks: {
            label: ctx => {
              if (ctx.dataset.label === dsTokens) return I18N.t('tooltip_tokensLabel', fmt(ctx.raw));
              if (ctx.dataset.label === dsCost) return I18N.t('tooltip_costLabel', fmtUSD(ctx.raw));
              if (ctx.dataset.label === dsAvg) return I18N.t('tooltip_monthlyAvgLabel', fmt(ctx.raw));
              return ctx.formattedValue;
            }
          }
        },
      },
      scales: {
        y: { ticks: { color: CHART_THEME.tick, callback: v => fmt(v) }, grid: { color: CHART_THEME.grid } },
        y1: { position: 'right', ticks: { color: CHART_THEME.tick, callback: v => '$' + v }, grid: { display: false } },
        x: { ticks: { color: CHART_THEME.tick }, grid: { display: false } },
      },
    },
  });

  // ---- All-time model doughnut (summed across months) ----
  const modelTotals = new Map();
  for (const m of monthly) {
    for (const b of (m.modelBreakdowns || [])) {
      modelTotals.set(b.modelName, (modelTotals.get(b.modelName) || 0) + modelTokens(b));
    }
  }
  const modelEntries = [...modelTotals.entries()].sort((a, b) => b[1] - a[1]);
  if (modelEntries.length > 0) {
    const modelSum = modelEntries.reduce((s, [, v]) => s + v, 0);
    new Chart(document.getElementById('modelChart'), {
      type: 'doughnut',
      data: {
        labels: modelEntries.map(([name]) => modelShort(name).label),
        datasets: [{
          data: modelEntries.map(([, v]) => v),
          backgroundColor: CHART_COLORS,
          borderColor: CHART_THEME.panelBg,
          borderWidth: 2,
        }],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { position: 'bottom', labels: { color: CHART_THEME.legend, font: { size: 10 }, boxWidth: 10, padding: 6 } },
          tooltip: {
            callbacks: {
              label: ctx => `${ctx.label}: ${fmt(ctx.raw)} (${(ctx.raw / modelSum * 100).toFixed(0)}%)`
            }
          }
        }
      }
    });
  }

  // ---- Cumulative usage curve (daily, since first record) ----
  const sortedDaily = [...daily].sort((a, b) => a.date.localeCompare(b.date));
  let cumTok = 0, cumCost = 0;
  const cumPoints = sortedDaily.map(d => {
    cumTok += d.totalTokens;
    cumCost += d.totalCost;
    return { date: d.date, tok: cumTok, cost: cumCost };
  });

  const dsCumTok = I18N.t('dsCumulativeTokens');
  const dsCumCost = I18N.t('dsCumulativeCost');
  new Chart(document.getElementById('cumulativeChart'), {
    type: 'line',
    data: {
      labels: cumPoints.map(p => p.date),
      datasets: [
        {
          label: dsCumTok,
          data: cumPoints.map(p => p.tok),
          borderColor: '#d97757',
          backgroundColor: 'rgba(217, 119, 87, 0.15)',
          fill: true,
          tension: 0.2,
          pointRadius: 0,
          yAxisID: 'y',
        },
        {
          label: dsCumCost,
          data: cumPoints.map(p => p.cost),
          borderColor: '#79c0ff',
          backgroundColor: 'transparent',
          tension: 0.2,
          pointRadius: 0,
          yAxisID: 'y1',
        },
      ],
    },
    options: {
      responsive: true,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { labels: { color: CHART_THEME.legend, font: { size: 11 } } },
        tooltip: {
          callbacks: {
            label: ctx => {
              if (ctx.dataset.label === dsCumTok) return I18N.t('tooltip_tokensLabel', fmt(ctx.raw));
              if (ctx.dataset.label === dsCumCost) return I18N.t('tooltip_costLabel', fmtUSD(ctx.raw));
              return ctx.formattedValue;
            }
          }
        },
      },
      scales: {
        y: { ticks: { color: CHART_THEME.tick, callback: v => fmt(v) }, grid: { color: CHART_THEME.grid } },
        y1: { position: 'right', ticks: { color: CHART_THEME.tick, callback: v => '$' + Math.round(v).toLocaleString() }, grid: { display: false } },
        x: { ticks: { color: CHART_THEME.tick, maxRotation: 0, autoSkip: true, maxTicksLimit: 12 }, grid: { display: false } },
      },
    },
  });

  // ---- Average by weekday (across all data) ----
  const dowSums = [0, 0, 0, 0, 0, 0, 0];
  const dowCounts = [0, 0, 0, 0, 0, 0, 0];
  for (const d of daily) {
    const dayIdx = new Date(d.date).getDay();
    dowSums[dayIdx] += d.totalTokens;
    dowCounts[dayIdx] += 1;
  }
  const dowAvg = dowSums.map((sum, i) => dowCounts[i] > 0 ? sum / dowCounts[i] : 0);
  const dowLabels = I18N.dow();
  // Reorder: Mon-first (1..6, 0) reads more naturally
  const order = [1, 2, 3, 4, 5, 6, 0];
  const reorderedLabels = order.map(i => dowLabels[i]);
  const reorderedAvg = order.map(i => dowAvg[i]);
  const reorderedCounts = order.map(i => dowCounts[i]);

  new Chart(document.getElementById('weekdayChart'), {
    type: 'bar',
    data: {
      labels: reorderedLabels,
      datasets: [{
        label: I18N.t('dsTotalTokens'),
        data: reorderedAvg,
        backgroundColor: order.map(i => i === 0 || i === 6 ? '#bc8cff' : '#d97757'),
        borderRadius: 4,
      }],
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => [
              I18N.t('tooltip_avgPerActiveDay', fmt(ctx.raw)),
              I18N.t('tooltip_activeDaysCount', reorderedCounts[ctx.dataIndex]),
            ]
          }
        },
      },
      scales: {
        y: { ticks: { color: CHART_THEME.tick, callback: v => fmt(v) }, grid: { color: CHART_THEME.grid } },
        x: { ticks: { color: CHART_THEME.tick }, grid: { display: false } },
      },
    },
  });

  // ---- Model share by month (stacked bar) ----
  const allModelNames = [...modelTotals.keys()].sort((a, b) => modelTotals.get(b) - modelTotals.get(a));
  const stackDatasets = allModelNames.map((name, idx) => ({
    label: modelShort(name).label,
    data: monthly.map(m => {
      const b = (m.modelBreakdowns || []).find(x => x.modelName === name);
      return b ? modelTokens(b) : 0;
    }),
    backgroundColor: CHART_COLORS[idx % CHART_COLORS.length],
    borderRadius: 2,
  }));

  new Chart(document.getElementById('modelStackChart'), {
    type: 'bar',
    data: {
      labels: monthly.map(m => m.month),
      datasets: stackDatasets,
    },
    options: {
      responsive: true,
      plugins: {
        legend: { labels: { color: CHART_THEME.legend, font: { size: 10 }, boxWidth: 10, padding: 6 } },
        tooltip: {
          callbacks: {
            label: ctx => `${ctx.dataset.label}: ${fmt(ctx.raw)}`
          }
        },
      },
      scales: {
        x: { stacked: true, ticks: { color: CHART_THEME.tick }, grid: { display: false } },
        y: { stacked: true, ticks: { color: CHART_THEME.tick, callback: v => fmt(v) }, grid: { color: CHART_THEME.grid } },
      },
    },
  });

  // ---- Monthly detail table ----
  const tbody = document.getElementById('monthlyTable');
  const reversed = [...monthly].reverse();
  for (let i = 0; i < reversed.length; i++) {
    const m = reversed[i];
    const prev = reversed[i + 1]; // older month (previous)
    const monthDaily = dailyByMonth.get(m.month) || [];
    const activityDays = monthDaily.length;
    const dailyAvg = activityDays > 0 ? m.totalTokens / activityDays : 0;
    const isCurrent = m.month === todayMonth;

    let deltaCell;
    if (prev && prev.totalTokens > 0) {
      const pct = ((m.totalTokens - prev.totalTokens) / prev.totalTokens) * 100;
      const up = pct >= 0;
      deltaCell = el('span', { class: up ? 'delta-up' : 'delta-down' },
        (up ? '↑' : '↓') + ' ' + Math.abs(pct).toFixed(0) + '%');
    } else {
      deltaCell = el('span', { style: { color: 'var(--muted)' } }, '-');
    }

    const monthCell = el('td', null,
      m.month,
      isCurrent ? el('span', { class: 'in-progress-tag' }, I18N.t('inProgressTag')) : null,
    );

    const tr = el('tr', { class: isCurrent ? 'current-month' : null },
      monthCell,
      el('td', { class: 'num' }, fmt(m.totalTokens)),
      el('td', { class: 'num' }, fmtUSD(m.totalCost)),
      el('td', { class: 'num' }, activityDays + I18N.t('daysSuffix')),
      el('td', { class: 'num' }, fmt(dailyAvg)),
      el('td', { class: 'num' }, deltaCell),
      el('td', null, buildModelPills(m.modelsUsed)),
    );
    tbody.appendChild(tr);
  }
}
</script>
</body>
</html>
